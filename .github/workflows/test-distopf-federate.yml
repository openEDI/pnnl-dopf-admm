name: TestDistopfFederate

on:
  push:
    paths:
      - 'src/distopf_federate/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=distopf_federate --cov-report=xml --cov-report=term-missing

      - name: Archive test results
        uses: actions/upload-artifact@v4
        if: always() && !env.ACT
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
