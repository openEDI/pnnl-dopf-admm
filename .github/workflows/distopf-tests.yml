name: distopf-federate tests

on:
  pull_request:
    paths:
      - "src/distopf_federate/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --extra test
      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short

  integration-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Build and run integration smoke test
        run: docker compose -f docker-compose.distopf.yml up --build --abort-on-container-exit --timeout 60
